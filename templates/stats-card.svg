<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="0.5" y="0.5" width="799" height="199" rx="12" fill="#0d1117" stroke="#30363d"/>

  <!-- Contributions Box (Left) -->
  <g id="contributions">
    <rect x="50" y="12" width="344" height="130" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="222" y="37" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f0f6fc">Contributions</text>
    <text x="62" y="62" font-family="Arial, sans-serif" font-size="11" fill="#8b949e">Best streak:</text>
    <text x="382" y="62" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#58a6ff">BEST_STREAK days</text>
    <text x="62" y="85" font-family="Arial, sans-serif" font-size="11" fill="#8b949e">Commits in CURRENT_YEAR:</text>
    <text x="354" y="85" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#58a6ff">YEAR_COMMITS</text>
    <text x="382" y="85" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="YEAR_DELTA_COLOR">YEAR_DELTA</text>
    <text x="62" y="108" font-family="Arial, sans-serif" font-size="11" fill="#8b949e">Total commits:</text>
    <text x="354" y="108" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#58a6ff">TOTAL_COMMITS</text>
    <text x="382" y="108" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="COMMITS_DELTA_COLOR">COMMITS_DELTA</text>
    <text x="62" y="131" font-family="Arial, sans-serif" font-size="11" fill="#8b949e">Pull requests:</text>
    <text x="354" y="131" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#58a6ff">TOTAL_DISCUSSIONS</text>
    <text x="382" y="131" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="DISCUSSIONS_DELTA_COLOR">DISCUSSIONS_DELTA</text>
  </g>

  <!-- Languages Box (Right) -->
  <g id="languages">
    <rect x="406" y="12" width="344" height="130" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="578" y="37" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f0f6fc">Languages</text>

    <!-- Language 1 bar -->
    <rect x="418" y="62" width="320" height="6" rx="2" fill="#21262d"/>
    <rect x="418" y="62" width="LANG1_WIDTH" height="6" rx="2" fill="LANG1_COLOR"/>
    <text x="418" y="57" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">LANG1_NAME</text>
    <text x="738" y="57" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">LANG1_PCT%</text>

    <!-- Language 2 bar -->
    <rect x="418" y="85" width="320" height="6" rx="2" fill="#21262d"/>
    <rect x="418" y="85" width="LANG2_WIDTH" height="6" rx="2" fill="LANG2_COLOR"/>
    <text x="418" y="80" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">LANG2_NAME</text>
    <text x="738" y="80" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">LANG2_PCT%</text>

    <!-- Language 3 bar -->
    <rect x="418" y="108" width="320" height="6" rx="2" fill="#21262d"/>
    <rect x="418" y="108" width="LANG3_WIDTH" height="6" rx="2" fill="LANG3_COLOR"/>
    <text x="418" y="103" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">LANG3_NAME</text>
    <text x="738" y="103" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">LANG3_PCT%</text>

    <!-- Language 4 bar -->
    <rect x="418" y="131" width="320" height="6" rx="2" fill="#21262d"/>
    <rect x="418" y="131" width="LANG4_WIDTH" height="6" rx="2" fill="LANG4_COLOR"/>
    <text x="418" y="126" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">LANG4_NAME</text>
    <text x="738" y="126" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#8b949e">LANG4_PCT%</text>
  </g>

  <line x1="50" y1="165" x2="750" y2="165" stroke="#30363d" />
  <text x="50" y="188" font-family="Arial, sans-serif" font-size="12" fill="#8b949e">🌐 joseph.kribs.net  •  ✉️ joseph@kribs.net</text>
  <text x="750" y="188" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#8b949e">📍 Littleton, CO • UPDATED</text>
</svg>
