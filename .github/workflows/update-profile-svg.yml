name: Update Profile SVG
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate-svg:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Real-Time Stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: a classic PAT (read:user) to include private contributions.
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: |
          # Helper: fetch a repo's star count, defaulting to 0 on any error.
          fetch_stars() {
            local s
            s=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "https://api.github.com/repos/$1" | jq -r '.stargazers_count // 0')
            if ! [[ "$s" =~ ^[0-9]+$ ]]; then s=0; fi
            echo "$s"
          }

          # Helper: format large counts as "3.9k".
          format_k() {
            if [ "$1" -gt 1000 ]; then
              echo "$(echo "scale=1; ($1+50)/1000" | bc)k"
            else
              echo "$1"
            fi
          }

          SWIFT_STARS=$(fetch_stars jellyfin/Swiftfin)
          CUSTOMPAGES_STARS=$(fetch_stars JPKribs/jellyfin-plugin-custompages)
          POSTER_STARS=$(fetch_stars JPKribs/jellyfin-plugin-episodepostergenerator)
          SYNC_STARS=$(fetch_stars JPKribs/jellyfin-plugin-serversync)
          USERMGMT_STARS=$(fetch_stars JPKribs/jellyfin-plugin-usermanagement)
          YOUTUBE_STARS=$(fetch_stars JPKribs/jellyfin-plugin-youtubeaudio)
          SWIFT_STARS_FORMATTED=$(format_k "$SWIFT_STARS")
          UPDATED=$(date +'%b %d, %Y')

          # Fetch real GitHub activity data
          chmod +x .github/scripts/fetch-github-stats.sh
          eval "$(.github/scripts/fetch-github-stats.sh)"

          # Debug output
          echo "SWIFT_STARS=$SWIFT_STARS CUSTOMPAGES_STARS=$CUSTOMPAGES_STARS POSTER_STARS=$POSTER_STARS"
          echo "SYNC_STARS=$SYNC_STARS USERMGMT_STARS=$USERMGMT_STARS YOUTUBE_STARS=$YOUTUBE_STARS"
          echo "TOTAL_COMMITS=$TOTAL_COMMITS YEAR_COMMITS=$YEAR_COMMITS CURRENT_YEAR=$CURRENT_YEAR"
          echo "BEST_STREAK=$BEST_STREAK CURRENT_STREAK=$CURRENT_STREAK"
          echo "TOTAL_POSTS=$TOTAL_POSTS TOTAL_REPLIES=$TOTAL_REPLIES TOTAL_DISCUSSIONS=$TOTAL_DISCUSSIONS"
          echo "LANG1_LINE=$LANG1_LINE LANG2_LINE=$LANG2_LINE LANG3_LINE=$LANG3_LINE LANG4_LINE=$LANG4_LINE"

          # Set defaults if empty
          TOTAL_COMMITS=${TOTAL_COMMITS:-0}
          YEAR_COMMITS=${YEAR_COMMITS:-0}
          CURRENT_YEAR=${CURRENT_YEAR:-$(date +%Y)}
          BEST_STREAK=${BEST_STREAK:-0}
          TOTAL_POSTS=${TOTAL_POSTS:-0}
          TOTAL_REPLIES=${TOTAL_REPLIES:-0}
          TOTAL_DISCUSSIONS=${TOTAL_DISCUSSIONS:-0}

          # Read history for fallback and delta computation
          if [ -f stats-history.json ]; then
            PREV_DATA=$(jq '.[0] // {}' stats-history.json)
            OLD_DATA=$(jq '.[-1] // {}' stats-history.json)
          else
            PREV_DATA="{}"
            OLD_DATA="{}"
          fi

          # Fallback: if a star count came back 0, reuse the previous day's value.
          star_fallback() {
            # $1 = current value, $2 = history key
            local cur="$1" key="$2"
            if [ "$cur" -eq 0 ]; then
              cur=$(echo "$PREV_DATA" | jq -r --arg k "$key" '.[$k] // 0')
              if ! [[ "$cur" =~ ^[0-9]+$ ]]; then cur=0; fi
            fi
            echo "$cur"
          }
          SWIFT_STARS=$(star_fallback "$SWIFT_STARS" swift_stars)
          CUSTOMPAGES_STARS=$(star_fallback "$CUSTOMPAGES_STARS" custompages_stars)
          POSTER_STARS=$(star_fallback "$POSTER_STARS" poster_stars)
          SYNC_STARS=$(star_fallback "$SYNC_STARS" sync_stars)
          USERMGMT_STARS=$(star_fallback "$USERMGMT_STARS" usermgmt_stars)
          YOUTUBE_STARS=$(star_fallback "$YOUTUBE_STARS" youtube_stars)
          SWIFT_STARS_FORMATTED=$(format_k "$SWIFT_STARS")

          # Fallback for activity stats if the API returned 0
          if [ "$TOTAL_COMMITS" -eq 0 ]; then TOTAL_COMMITS=$(echo "$PREV_DATA" | jq -r '.total_commits // 0'); fi
          if [ "$YEAR_COMMITS" -eq 0 ]; then YEAR_COMMITS=$(echo "$PREV_DATA" | jq -r '.year_commits // 0'); fi
          if [ "$BEST_STREAK" -eq 0 ]; then BEST_STREAK=$(echo "$PREV_DATA" | jq -r '.best_streak // 0'); fi
          if [ "$TOTAL_POSTS" -eq 0 ]; then TOTAL_POSTS=$(echo "$PREV_DATA" | jq -r '.total_posts // 0'); fi
          if [ "$TOTAL_REPLIES" -eq 0 ]; then TOTAL_REPLIES=$(echo "$PREV_DATA" | jq -r '.total_replies // 0'); fi
          if [ "$TOTAL_DISCUSSIONS" -eq 0 ]; then TOTAL_DISCUSSIONS=$(echo "$PREV_DATA" | jq -r '.total_discussions // 0'); fi

          # Monotonic guard: all-time totals only ever grow, so never let a
          # transient API hiccup drop them. NOTE: year_commits is intentionally
          # excluded — it must reset to ~0 each January.
          PREV_COMMITS=$(echo "$PREV_DATA" | jq -r '.total_commits // 0')
          PREV_POSTS=$(echo "$PREV_DATA" | jq -r '.total_posts // 0')
          PREV_REPLIES=$(echo "$PREV_DATA" | jq -r '.total_replies // 0')
          PREV_DISCUSSIONS=$(echo "$PREV_DATA" | jq -r '.total_discussions // 0')
          if [ "$TOTAL_COMMITS" -lt "$PREV_COMMITS" ]; then TOTAL_COMMITS=$PREV_COMMITS; fi
          if [ "$TOTAL_POSTS" -lt "$PREV_POSTS" ]; then TOTAL_POSTS=$PREV_POSTS; fi
          if [ "$TOTAL_REPLIES" -lt "$PREV_REPLIES" ]; then TOTAL_REPLIES=$PREV_REPLIES; fi
          if [ "$TOTAL_DISCUSSIONS" -lt "$PREV_DISCUSSIONS" ]; then TOTAL_DISCUSSIONS=$PREV_DISCUSSIONS; fi

          # Parse top 4 languages (format: "44 Swift" or "22 C#")
          parse_lang_name() { echo "$1" | awk '{$1=""; print}' | sed 's/^ //'; }
          parse_lang_pct()  { echo "$1" | awk '{print $1}'; }
          LANG1_PCT=$(parse_lang_pct "$LANG1_LINE"); LANG1_NAME=$(parse_lang_name "$LANG1_LINE")
          LANG2_PCT=$(parse_lang_pct "$LANG2_LINE"); LANG2_NAME=$(parse_lang_name "$LANG2_LINE")
          LANG3_PCT=$(parse_lang_pct "$LANG3_LINE"); LANG3_NAME=$(parse_lang_name "$LANG3_LINE")
          LANG4_PCT=$(parse_lang_pct "$LANG4_LINE"); LANG4_NAME=$(parse_lang_name "$LANG4_LINE")

          LANG1_NAME=${LANG1_NAME:-"Unknown"}; LANG1_PCT=${LANG1_PCT:-0}
          LANG2_NAME=${LANG2_NAME:-"Unknown"}; LANG2_PCT=${LANG2_PCT:-0}
          LANG3_NAME=${LANG3_NAME:-"Unknown"}; LANG3_PCT=${LANG3_PCT:-0}
          LANG4_NAME=${LANG4_NAME:-"Unknown"}; LANG4_PCT=${LANG4_PCT:-0}

          echo "LANG1: $LANG1_NAME ($LANG1_PCT%)"
          echo "LANG2: $LANG2_NAME ($LANG2_PCT%)"
          echo "LANG3: $LANG3_NAME ($LANG3_PCT%)"
          echo "LANG4: $LANG4_NAME ($LANG4_PCT%)"

          # Bar widths (out of 320px max)
          LANG1_WIDTH=$((LANG1_PCT * 320 / 100))
          LANG2_WIDTH=$((LANG2_PCT * 320 / 100))
          LANG3_WIDTH=$((LANG3_PCT * 320 / 100))
          LANG4_WIDTH=$((LANG4_PCT * 320 / 100))

          # Language colors
          lang_color() {
            case "$1" in
              Swift) echo "#F05138" ;;
              Go) echo "#00ADD8" ;;
              "C#") echo "#512BD4" ;;
              Python) echo "#3776AB" ;;
              JavaScript) echo "#F7DF1E" ;;
              TypeScript) echo "#3178C6" ;;
              *) echo "#8B949E" ;;
            esac
          }
          LANG1_COLOR=$(lang_color "$LANG1_NAME")
          LANG2_COLOR=$(lang_color "$LANG2_NAME")
          LANG3_COLOR=$(lang_color "$LANG3_NAME")
          LANG4_COLOR=$(lang_color "$LANG4_NAME")

          # Deltas (current vs ~7 days ago)
          format_delta() {
            if [ "$1" -gt 0 ]; then echo "+$1"
            elif [ "$1" -lt 0 ]; then echo "$1"
            else echo "--"
            fi
          }
          delta_color() {
            if [ "$1" -gt 0 ]; then echo "#3fb950"
            elif [ "$1" -lt 0 ]; then echo "#f85149"
            else echo "#8b949e"
            fi
          }

          OLD_SWIFT=$(echo "$OLD_DATA" | jq -r '.swift_stars // 0')
          OLD_CUSTOMPAGES=$(echo "$OLD_DATA" | jq -r '.custompages_stars // 0')
          OLD_POSTER=$(echo "$OLD_DATA" | jq -r '.poster_stars // 0')
          OLD_SYNC=$(echo "$OLD_DATA" | jq -r '.sync_stars // 0')
          OLD_USERMGMT=$(echo "$OLD_DATA" | jq -r '.usermgmt_stars // 0')
          OLD_YOUTUBE=$(echo "$OLD_DATA" | jq -r '.youtube_stars // 0')
          OLD_COMMITS=$(echo "$OLD_DATA" | jq -r '.total_commits // 0')
          OLD_YEAR=$(echo "$OLD_DATA" | jq -r '.year_commits // 0')
          OLD_DISCUSSIONS=$(echo "$OLD_DATA" | jq -r '.total_discussions // 0')

          SWIFT_DELTA=$(format_delta $((SWIFT_STARS - OLD_SWIFT)))
          CUSTOMPAGES_DELTA=$(format_delta $((CUSTOMPAGES_STARS - OLD_CUSTOMPAGES)))
          POSTER_DELTA=$(format_delta $((POSTER_STARS - OLD_POSTER)))
          SYNC_DELTA=$(format_delta $((SYNC_STARS - OLD_SYNC)))
          USERMGMT_DELTA=$(format_delta $((USERMGMT_STARS - OLD_USERMGMT)))
          YOUTUBE_DELTA=$(format_delta $((YOUTUBE_STARS - OLD_YOUTUBE)))
          COMMITS_DELTA=$(format_delta $((TOTAL_COMMITS - OLD_COMMITS)))
          YEAR_DELTA=$(format_delta $((YEAR_COMMITS - OLD_YEAR)))
          DISCUSSIONS_DELTA=$(format_delta $((TOTAL_DISCUSSIONS - OLD_DISCUSSIONS)))

          SWIFT_DELTA_COLOR=$(delta_color $((SWIFT_STARS - OLD_SWIFT)))
          CUSTOMPAGES_DELTA_COLOR=$(delta_color $((CUSTOMPAGES_STARS - OLD_CUSTOMPAGES)))
          POSTER_DELTA_COLOR=$(delta_color $((POSTER_STARS - OLD_POSTER)))
          SYNC_DELTA_COLOR=$(delta_color $((SYNC_STARS - OLD_SYNC)))
          USERMGMT_DELTA_COLOR=$(delta_color $((USERMGMT_STARS - OLD_USERMGMT)))
          YOUTUBE_DELTA_COLOR=$(delta_color $((YOUTUBE_STARS - OLD_YOUTUBE)))
          COMMITS_DELTA_COLOR=$(delta_color $((TOTAL_COMMITS - OLD_COMMITS)))
          YEAR_DELTA_COLOR=$(delta_color $((YEAR_COMMITS - OLD_YEAR)))
          DISCUSSIONS_DELTA_COLOR=$(delta_color $((TOTAL_DISCUSSIONS - OLD_DISCUSSIONS)))

          # Update stats history JSON (keep last 7 days)
          TODAY=$(date +%Y-%m-%d)
          jq --arg date "$TODAY" \
             --argjson swift "$SWIFT_STARS" \
             --argjson custompages "$CUSTOMPAGES_STARS" \
             --argjson poster "$POSTER_STARS" \
             --argjson sync "$SYNC_STARS" \
             --argjson usermgmt "$USERMGMT_STARS" \
             --argjson youtube "$YOUTUBE_STARS" \
             --argjson commits "$TOTAL_COMMITS" \
             --argjson year "$YEAR_COMMITS" \
             --argjson streak "$BEST_STREAK" \
             --argjson posts "$TOTAL_POSTS" \
             --argjson replies "$TOTAL_REPLIES" \
             --argjson discussions "$TOTAL_DISCUSSIONS" \
             --arg l1name "$LANG1_NAME" --argjson l1pct "$LANG1_PCT" \
             --arg l2name "$LANG2_NAME" --argjson l2pct "$LANG2_PCT" \
             --arg l3name "$LANG3_NAME" --argjson l3pct "$LANG3_PCT" \
             --arg l4name "$LANG4_NAME" --argjson l4pct "$LANG4_PCT" \
             '[{
               date: $date,
               swift_stars: $swift,
               custompages_stars: $custompages,
               poster_stars: $poster,
               sync_stars: $sync,
               usermgmt_stars: $usermgmt,
               youtube_stars: $youtube,
               total_commits: $commits,
               year_commits: $year,
               best_streak: $streak,
               total_posts: $posts,
               total_replies: $replies,
               total_discussions: $discussions,
               lang1: { name: $l1name, pct: $l1pct },
               lang2: { name: $l2name, pct: $l2pct },
               lang3: { name: $l3name, pct: $l3pct },
               lang4: { name: $l4name, pct: $l4pct }
             }] + . | .[0:7]' stats-history.json > stats-history-tmp.json
          mv stats-history-tmp.json stats-history.json

          # Copy template and substitute variables
          cp profile-summary-template.svg profile-summary.svg

          sed -i "s|SWIFT_STARS_FORMATTED|$SWIFT_STARS_FORMATTED|g" profile-summary.svg
          sed -i "s|CUSTOMPAGES_STARS|$CUSTOMPAGES_STARS|g" profile-summary.svg
          sed -i "s|POSTER_STARS|$POSTER_STARS|g" profile-summary.svg
          sed -i "s|SYNC_STARS|$SYNC_STARS|g" profile-summary.svg
          sed -i "s|USERMGMT_STARS|$USERMGMT_STARS|g" profile-summary.svg
          sed -i "s|YOUTUBE_STARS|$YOUTUBE_STARS|g" profile-summary.svg
          sed -i "s|UPDATED|$UPDATED|g" profile-summary.svg
          sed -i "s|TOTAL_COMMITS|$TOTAL_COMMITS|g" profile-summary.svg
          sed -i "s|YEAR_COMMITS|$YEAR_COMMITS|g" profile-summary.svg
          sed -i "s|CURRENT_YEAR|$CURRENT_YEAR|g" profile-summary.svg
          sed -i "s|BEST_STREAK|$BEST_STREAK|g" profile-summary.svg
          sed -i "s|TOTAL_DISCUSSIONS|$TOTAL_DISCUSSIONS|g" profile-summary.svg
          sed -i "s|LANG1_NAME|$LANG1_NAME|g" profile-summary.svg
          sed -i "s|LANG1_PCT|$LANG1_PCT|g" profile-summary.svg
          sed -i "s|LANG1_WIDTH|$LANG1_WIDTH|g" profile-summary.svg
          sed -i "s|LANG1_COLOR|$LANG1_COLOR|g" profile-summary.svg
          sed -i "s|LANG2_NAME|$LANG2_NAME|g" profile-summary.svg
          sed -i "s|LANG2_PCT|$LANG2_PCT|g" profile-summary.svg
          sed -i "s|LANG2_WIDTH|$LANG2_WIDTH|g" profile-summary.svg
          sed -i "s|LANG2_COLOR|$LANG2_COLOR|g" profile-summary.svg
          sed -i "s|LANG3_NAME|$LANG3_NAME|g" profile-summary.svg
          sed -i "s|LANG3_PCT|$LANG3_PCT|g" profile-summary.svg
          sed -i "s|LANG3_WIDTH|$LANG3_WIDTH|g" profile-summary.svg
          sed -i "s|LANG3_COLOR|$LANG3_COLOR|g" profile-summary.svg
          sed -i "s|LANG4_NAME|$LANG4_NAME|g" profile-summary.svg
          sed -i "s|LANG4_PCT|$LANG4_PCT|g" profile-summary.svg
          sed -i "s|LANG4_WIDTH|$LANG4_WIDTH|g" profile-summary.svg
          sed -i "s|LANG4_COLOR|$LANG4_COLOR|g" profile-summary.svg

          # Delta substitutions (color first to avoid partial matches)
          sed -i "s|SWIFT_DELTA_COLOR|$SWIFT_DELTA_COLOR|g" profile-summary.svg
          sed -i "s|SWIFT_DELTA|$SWIFT_DELTA|g" profile-summary.svg
          sed -i "s|CUSTOMPAGES_DELTA_COLOR|$CUSTOMPAGES_DELTA_COLOR|g" profile-summary.svg
          sed -i "s|CUSTOMPAGES_DELTA|$CUSTOMPAGES_DELTA|g" profile-summary.svg
          sed -i "s|POSTER_DELTA_COLOR|$POSTER_DELTA_COLOR|g" profile-summary.svg
          sed -i "s|POSTER_DELTA|$POSTER_DELTA|g" profile-summary.svg
          sed -i "s|SYNC_DELTA_COLOR|$SYNC_DELTA_COLOR|g" profile-summary.svg
          sed -i "s|SYNC_DELTA|$SYNC_DELTA|g" profile-summary.svg
          sed -i "s|USERMGMT_DELTA_COLOR|$USERMGMT_DELTA_COLOR|g" profile-summary.svg
          sed -i "s|USERMGMT_DELTA|$USERMGMT_DELTA|g" profile-summary.svg
          sed -i "s|YOUTUBE_DELTA_COLOR|$YOUTUBE_DELTA_COLOR|g" profile-summary.svg
          sed -i "s|YOUTUBE_DELTA|$YOUTUBE_DELTA|g" profile-summary.svg
          sed -i "s|COMMITS_DELTA_COLOR|$COMMITS_DELTA_COLOR|g" profile-summary.svg
          sed -i "s|COMMITS_DELTA|$COMMITS_DELTA|g" profile-summary.svg
          sed -i "s|YEAR_DELTA_COLOR|$YEAR_DELTA_COLOR|g" profile-summary.svg
          sed -i "s|YEAR_DELTA|$YEAR_DELTA|g" profile-summary.svg
          sed -i "s|DISCUSSIONS_DELTA_COLOR|$DISCUSSIONS_DELTA_COLOR|g" profile-summary.svg
          sed -i "s|DISCUSSIONS_DELTA|$DISCUSSIONS_DELTA|g" profile-summary.svg

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-summary.svg stats-history.json
          git commit -m "chore: update profile SVG with latest stats" || exit 0
          git push
